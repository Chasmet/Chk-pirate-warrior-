name: Construire APK Android

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Récupérer le dépôt
        uses: actions/checkout@v6

      - name: Installer Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Installer Gradle 9.5
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '9.5.0'

      - name: Installer le SDK Android 37
        run: |
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager "platforms;android-37" "build-tools;36.0.0"

      - name: Tests et compilation
        run: gradle --no-daemon clean testDebugUnitTest lintDebug assembleDebug

      - name: Renommer l'APK
        run: cp app/build/outputs/apk/debug/app-debug.apk CHK-Pirate-Warrior-V1.apk

      - name: Publier l'APK
        uses: actions/upload-artifact@v4
        with:
          name: CHK-Pirate-Warrior-APK
          path: CHK-Pirate-Warrior-V1.apk
          if-no-files-found: error
          retention-days: 30
