name: Construire APK Android

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Récupérer le dépôt
        uses: actions/checkout@v6

      - name: Installer Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Installer Gradle 9.5
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '9.5.0'

      - name: Installer le SDK Android 36
        run: |
          SDKMANAGER="$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager"
          yes | "$SDKMANAGER" --licenses >/dev/null 2>&1 || true
          "$SDKMANAGER" "platforms;android-36" "build-tools;36.0.0" >/dev/null

      - name: Tests et compilation
        shell: bash
        run: |
          set +e
          gradle --no-daemon --console=plain clean testDebugUnitTest lintDebug assembleDebug > gradle-build.log 2>&1
          STATUS=$?
          if [ "$STATUS" -ne 0 ]; then
            echo "===== ERREUR DE COMPILATION ====="
            grep -E -B 3 -A 8 "(^e: |error:|FAILURE:|What went wrong|Execution failed|BUILD FAILED|Could not|Exception)" gradle-build.log | tail -n 180 || tail -n 180 gradle-build.log
            exit "$STATUS"
          fi
          tail -n 60 gradle-build.log

      - name: Renommer l'APK
        run: cp app/build/outputs/apk/debug/app-debug.apk CHK-Pirate-Warrior-V1.apk

      - name: Publier l'APK
        uses: actions/upload-artifact@v4
        with:
          name: CHK-Pirate-Warrior-APK
          path: CHK-Pirate-Warrior-V1.apk
          if-no-files-found: error
          retention-days: 30
