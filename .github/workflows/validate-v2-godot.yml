name: Valider et construire V2 Godot 3D

on:
  push:
    branches: [ v2-godot-3d ]
    paths:
      - 'godot/**'
      - '.github/workflows/validate-v2-godot.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'godot/**'
      - '.github/workflows/validate-v2-godot.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validation-et-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Récupérer le dépôt
        uses: actions/checkout@v6

      - name: Installer Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Préparer Android
        shell: bash
        run: |
          SDKMANAGER="$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager"
          yes | "$SDKMANAGER" --licenses >/dev/null 2>&1 || true
          "$SDKMANAGER" "platform-tools" "platforms;android-36" "build-tools;36.0.0" >/dev/null
          mkdir -p "$HOME/.android"
          if [ ! -f "$HOME/.android/debug.keystore" ]; then
            keytool -genkeypair -v \
              -keystore "$HOME/.android/debug.keystore" \
              -storepass android \
              -alias androiddebugkey \
              -keypass android \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000 \
              -dname "CN=Android Debug,O=CHK Pirate Warrior,C=FR" >/dev/null 2>&1
          fi

      - name: Installer Godot 4.6.3 officiel
        shell: bash
        run: |
          curl -L --fail --retry 3 \
            -o godot.zip \
            https://github.com/godotengine/godot-builds/releases/download/4.6.3-stable/Godot_v4.6.3-stable_linux.x86_64.zip
          unzip -q godot.zip -d "$RUNNER_TEMP/godot"
          GODOT_BIN=$(find "$RUNNER_TEMP/godot" -maxdepth 1 -type f -name 'Godot_v4.6.3-stable_linux*' | head -n 1)
          chmod +x "$GODOT_BIN"
          echo "GODOT_BIN=$GODOT_BIN" >> "$GITHUB_ENV"
          "$GODOT_BIN" --version

      - name: Installer les modèles d’export Android
        shell: bash
        run: |
          curl -L --fail --retry 3 \
            -o templates.tpz \
            https://github.com/godotengine/godot-builds/releases/download/4.6.3-stable/Godot_v4.6.3-stable_export_templates.tpz
          rm -rf "$RUNNER_TEMP/export-templates"
          mkdir -p "$RUNNER_TEMP/export-templates"
          unzip -q templates.tpz -d "$RUNNER_TEMP/export-templates"
          mkdir -p "$HOME/.local/share/godot/export_templates/4.6.3.stable"
          cp -R "$RUNNER_TEMP/export-templates/templates/." "$HOME/.local/share/godot/export_templates/4.6.3.stable/"

      - name: Importer et analyser le projet
        shell: bash
        run: |
          set -o pipefail
          timeout 240s "$GODOT_BIN" --headless --editor --path godot --quit 2>&1 | tee godot-validation.log
          if grep -E "SCRIPT ERROR|Parse Error|Parser Error|Failed to load script|ERROR:" godot-validation.log; then
            echo "Des erreurs Godot ont été détectées."
            exit 1
          fi

      - name: Construire l’APK Godot V2
        shell: bash
        run: |
          set -o pipefail
          mkdir -p build
          "$GODOT_BIN" --headless --path godot \
            --export-debug "Android V2 Debug" \
            "$GITHUB_WORKSPACE/build/CHK-Pirate-Warrior-V2-debug.apk" 2>&1 | tee godot-export.log
          test -s build/CHK-Pirate-Warrior-V2-debug.apk

      - name: Publier les journaux
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: journaux-v2-godot
          path: |
            godot-validation.log
            godot-export.log
          if-no-files-found: warn
          retention-days: 7

      - name: Publier l’APK V2
        uses: actions/upload-artifact@v4
        with:
          name: CHK-Pirate-Warrior-V2-APK
          path: build/CHK-Pirate-Warrior-V2-debug.apk
          if-no-files-found: error
          retention-days: 30
