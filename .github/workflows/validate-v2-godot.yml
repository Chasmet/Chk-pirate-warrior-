name: Valider V2 Godot 3D

on:
  push:
    branches: [ v2-godot-3d ]
    paths:
      - 'godot/**'
      - '.github/workflows/validate-v2-godot.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'godot/**'
      - '.github/workflows/validate-v2-godot.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validation-godot:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Récupérer le dépôt
        uses: actions/checkout@v6

      - name: Installer Godot 4.6.3 officiel
        run: |
          curl -L --fail --retry 3 \
            -o godot.zip \
            https://github.com/godotengine/godot-builds/releases/download/4.6.3-stable/Godot_v4.6.3-stable_linux.x86_64.zip
          unzip -q godot.zip -d "$RUNNER_TEMP/godot"
          GODOT_BIN=$(find "$RUNNER_TEMP/godot" -maxdepth 1 -type f -name 'Godot_v4.6.3-stable_linux*' | head -n 1)
          chmod +x "$GODOT_BIN"
          echo "GODOT_BIN=$GODOT_BIN" >> "$GITHUB_ENV"
          "$GODOT_BIN" --version

      - name: Importer et analyser le projet
        shell: bash
        run: |
          set -o pipefail
          timeout 180s "$GODOT_BIN" --headless --editor --path godot --quit 2>&1 | tee godot-validation.log
          if grep -E "SCRIPT ERROR|Parse Error|Parser Error|Failed to load script|ERROR:" godot-validation.log; then
            echo "Des erreurs Godot ont été détectées."
            exit 1
          fi

      - name: Publier le journal de validation
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: journal-validation-godot-v2
          path: godot-validation.log
          if-no-files-found: warn
          retention-days: 7
